name = "draw-guess-worker"
main = "src/index.ts"
compatibility_date = "2024-12-05"

routes = [
  { pattern = "draw-guess.dengjiabei.cn/api/*", zone_name = "dengjiabei.cn" }
]

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
